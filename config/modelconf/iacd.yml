optimizer:
  name: adam                
  lr: 1.0e-3               
  weight_decay: 0          

train:
  epoch: 200               # Maximum number of training epochs
  batch_size: 1024         # Training batch size (users per batch)
  save_model: false        # Whether to save model checkpoints
  loss: pairwise           # Loss type: pairwise (BPR)
  test_step: 1             # Evaluate every N epochs
  patience: 10             # Early stopping patience (epochs without improvement)
  reproducible: true       # Enable reproducible results
  seed: 2025              # Random seed for reproducibility

test:
  metrics: [recall, ndcg, hr]  # Evaluation metrics
  k: [5, 10, 20]              # Top-K for metrics
  batch_size: 1024            # Evaluation batch size
  eval_at_one_forward: true   # Compute all embeddings at once (faster for GNN models)

data:
  type: kg                 # Data type: kg (knowledge graph)
  name: mooc              # Dataset name: mooc, mooper, coco

# Model architecture settings
model:
  name: iacd              # Model name
  
  # Embedding dimensions
  embedding_size: 64      # Dimension of user/item/entity embeddings
  
  # GNN layers
  layer_num: 2           # Number of LightGCN layers for collaborative filtering
  kg_layer_num: 2        # Number of RGAT layers for knowledge graph
  
  # Intent learning
  intent_size: 4        # Number of user intent prototypes
  
  # Loss weights
  reg_weight: 1.0e-2     # L2 regularization weight
  cl_weight: 0.01        # Contrastive learning loss weight
  student_weight: 0.1    # Student distillation loss weight
  teacher_weight: 0.1    # Teacher supervision loss weight
  
  # Temperature
  temperature: 0.2       # Temperature for contrastive learning
